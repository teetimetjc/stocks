name: Stock Scanner

on:
  workflow_dispatch:
  schedule:
    # Every 20 min, 13:00-21:40 UTC, Mon-Fri — wide enough to bracket
    # US market hours (9:30-16:00 ET) across both EDT and EST. The
    # script itself checks is_market_hours() and skips outside that
    # window, so off-hours runs are cheap no-ops.
    - cron: '0,20,40 13-21 * * 1-5'

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread

      - name: Run stock scan
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python -c "import stocks; stocks.run_scan()"
